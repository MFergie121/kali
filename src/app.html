<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        var theme = localStorage.getItem('app-theme');
        if (theme && theme !== 'serika') {
          document.documentElement.dataset.theme = theme;
        }
        var font = localStorage.getItem('app-font');
        var fontMap = {
          'ibm-plex-mono': '"IBM Plex Mono", monospace',
          'geist': '"Geist", sans-serif',
          'fraunces': '"Fraunces", serif',
          'dm-sans': '"DM Sans", sans-serif',
          'syne': '"Syne", sans-serif'
        };
        if (font && fontMap[font]) {
          document.documentElement.style.setProperty('--font-sans', fontMap[font]);
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@400;500;600&family=Fraunces:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=Syne:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="theme-color" content="#2c2e31" />
    <meta name="apple-mobile-web-app-title" content="Kali AFL" />
    <title>Kali AFL — Free AFL Stats API</title>
    <meta name="description" content="Free AFL Stats API with historical data from 2000 to present. 1,000 requests per day, no credit card required." />
    <meta property="og:site_name" content="Kali AFL" />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:image" content="https://kaliaflstats.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="https://kaliaflstats.com/og-image.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
